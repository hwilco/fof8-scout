      target_space: "raw"
  - candidate_id: "H3"
    label: "control_window_raw_all_positions"
    regressor:
      model: "catboost_regressor_rmse"
      target_config: "talent_control_window"
      target_col: "Control_Window_Mean_Current_Overall"
      target_space: "raw"
  - candidate_id: "H4"
    label: "control_window_pos_z_all_positions"
    regressor:
      model: "catboost_regressor_rmse"
      target_config: "talent_control_window_pos_z"

target_name: "draft_outcome_targets"
classifier_sieve:
  target_col: "Control_Window_Target_Observed"
  merit_threshold: 0
  min_positive_recall: 0.95
  derived_targets:
    - target_col: "Control_Window_Target_Observed"
      kind: "not_null"
      source_col: "Control_Window_Mean_Current_Overall"
regressor_intensity:
  target_col: "Control_Window_Mean_Current_Overall"
  target_space: "raw"
  target_family: "talent"
  row_filter: "regression_target_observed"
  sample_weight:
    enabled: true
    target_col: "__regressor_sample_weight"
    source_col: "Control_Window_Mean_Current_Overall"
    kind: "global_percentile_bucket"
    base_weight: 1.0
    thresholds:
      - percentile: 0.75
        weight: 1.5
outcome_scorecard:
  columns:
    - "Control_Window_Mean_Current_Overall"
    - "Control_Window_Discounted_Mean_Current_Overall"
    - "Top3_Mean_Current_Overall"
    - "Peak_Overall"
    - "Career_Games_Played"
    - "Positive_Career_Merit_Cap_Share"
    - "Career_Merit_Cap_Share"
    - "Positive_DPO"
  optional_columns:
    - "Award_Count"
    - "Hall_of_Fame_Flag"
    - "Hall_Of_Fame_Points"
  elite:
    enabled: true
    source_column: "Control_Window_Mean_Current_Overall"
    quantile: 0.95
    scope: "position_group"
    scope_column: "Position_Group"
    fallback_scope: "global"
    min_group_size: 100
    top_k_precision: 32
    top_k_recall: 64

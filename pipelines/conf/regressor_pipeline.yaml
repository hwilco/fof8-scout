defaults:
  - _self_
  - ablation: default
  - data: fof8_base
  - target: economic
  - split: random
  - cv: kfold_5
  - model: catboost_tweedie_regressor
  - hparams_search: catboost_tweedie_regressor
  - experiment: null
  - override hydra/sweeper: optuna

# --- Experiment Metadata ---
experiment_name: "Intensity_Regressor"

# --- Execution Settings ---
quiet_sweep: true            # If true, suppresses non-essential output during sweeps
use_gpu: false               # Enable GPU acceleration for supported models
seed: 42                     # Global random seed

# --- Data Slicing & Feature Logic ---
positions: "all"
mask_positional_features: true

# --- Optimization Targets ---
optimization:
  metric: "regressor_draft_value_score"
  direction: "maximize"

# --- Feature Ablation Settings ---
ablation:
  toggles:
    no_position: false
    no_position_group: false
    no_combine: false
    no_interviewed: true
    no_zscores: false
    no_scout: true
    no_delta: true
    no_college: true

diagnostics:
  log_importance: true
  log_shap: true

tags:
  version: "3.0"
  type: "intensity_regressor"

hydra:
  job:
    chdir: True
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  sweeper:
    direction: ${optimization.direction}
    study_name: regressor_v1
    n_trials: 20
    sampler:
      _target_: optuna.samplers.TPESampler
      seed: 42
      multivariate: true

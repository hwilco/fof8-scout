# @package _global_

# This experiment focuses purely on optimizing the Classifier Sieve Classifier.

defaults:
  - override /hparams_search: catboost_classifier_career_threshold

# --- Metadata & Logging ---
experiment_name: "Classifier_Catboost_Hyperopt_v1"
quiet_sweep: true

# --- Optimization Target ---
optimization:
  metric: "classifier_oof_pr_auc"
  direction: "maximize"

# --- Hydra Sweeper Settings ---
hydra:
  sweeper:
    n_trials: 100
    direction: ${optimization.direction}
    study_name: catboost_classifier_tuning_v1
    storage: sqlite:///fof8-ml/optuna.db

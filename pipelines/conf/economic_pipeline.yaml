defaults:
  - _self_
  - data: fof8_base
  - target: economic
  - split: chronological
  - cv: kfold_5
  - model@stage1_model: s1_catboost
  - model@stage2_model: reg_tweedie
  - hparams_search: s1_catboost_survival
  - experiment: null
  - override hydra/sweeper: optuna

# --- Experiment Metadata ---
experiment_name: "Economic_Talent_Engine_v3"
# version: "3.0" # Managed in tags below

# --- Execution Flow ---
train_stage2: true           # If true, trains the Stage 2 Intensity Regressor
stage1_run_id: null          # If provided (e.g., "abcdef123"), skips Stage 1 training and loads results from this run
quiet_sweep: false           # If true, suppresses non-essential console output during hyperparameter sweeps
use_gpu: false               # Enable GPU acceleration for supported models (CatBoost/XGBoost)
seed: 42                     # Global random seed for reproducibility

# --- Data Slicing & Feature Logic ---
positions: "all"             # Position groups to include (e.g., "QB", ["WR", "TE"]) or "all" for everyone
mask_positional_features: true # If true, zero out position-specific stats to prevent leakage in mixed-position models
include_features: null       # Optional list of feature names (or wildcards) to keep. If null, all are used.
exclude_features: null       # Optional list of feature names (or wildcards) to drop.

# --- Optimization Targets ---
optimization:
  metric: "s1_oof_pr_auc"    # Metric used to determine the "Champion" in sweeps (s1_oof_pr_auc, s2_oof_rmse, etc.)
  direction: "maximize"      # "maximize" or "minimize" depending on the metric

diagnostics:
  log_importance: true
  log_shap: true

tags:
  version: "3.0"
  type: "economic_talent"

hydra:
  job:
    chdir: True
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  sweeper:
    direction: ${optimization.direction}
    study_name: economic_optimization_v1
    n_trials: 20
    # storage: sqlite:///fof8-ml/optuna.db # Enable this to warm-start/resume sweeps
    sampler:
      _target_: optuna.samplers.TPESampler
      seed: 42
      multivariate: true

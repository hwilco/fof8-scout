# @package hydra.sweeper
search_space:
  model.params.depth:
    type: int
    low: 3   # Lowered floor
    high: 8  # Clamped ceiling to prevent memorizing noise

  model.params.learning_rate:
    type: float
    low: 0.01
    high: 0.15

  model.params.l2_leaf_reg:
    type: float
    low: 3.0   # Raised floor
    high: 15.0 # Raised ceiling for much stronger regularization

  model.params.random_strength:
    type: float
    low: 0.0
    high: 3.0  # Slightly expanded ceiling

  model.params.colsample_bylevel:
    type: float
    low: 0.5
    high: 1.0

  model.params.one_hot_max_size:
    type: int
    low: 2
    high: 20

  # --- NEW ADDITIONS FOR IMBALANCED/NOISY DATA ---
  model.params.min_data_in_leaf:
    type: int
    low: 20
    high: 150

  model.params.bagging_temperature:
    type: float
    low: 0.0
    high: 5.0
  # -----------------------------------------------

  # Feature ablation toggles (safe for Optuna JSON serialization).
  ablation.toggles.no_position:
    type: categorical
    choices: [true, false]

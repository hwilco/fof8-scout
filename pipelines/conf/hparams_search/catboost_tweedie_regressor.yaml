# @package hydra.sweeper
search_space:
  model.params.variance_power:
    type: float
    low: 1.05
    high: 1.95

  model.params.learning_rate:
    type: float
    low: 0.005
    high: 0.08
    log: true

  model.params.depth:
    type: int
    low: 3
    high: 8

  model.params.iterations:
    type: int
    low: 800
    high: 4000
    step: 200

  model.params.l2_leaf_reg:
    type: float
    low: 1.0
    high: 50.0
    log: true

  model.params.random_strength:
    type: float
    low: 0.0
    high: 5.0

  model.params.colsample_bylevel:
    type: float
    low: 0.5
    high: 1.0

  model.params.one_hot_max_size:
    type: int
    low: 2
    high: 20

  model.params.min_data_in_leaf:
    type: int
    low: 10
    high: 150

  model.params.bagging_temperature:
    type: float
    low: 0.0
    high: 5.0

  # Feature ablation toggles (safe for Optuna JSON serialization).
  ablation.toggles.no_position_group:
    type: categorical
    choices: [true, false]

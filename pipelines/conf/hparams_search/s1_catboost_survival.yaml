# @package hydra.sweeper
search_space:
  stage1_model.params.depth:
    type: int
    low: 3   # Lowered floor
    high: 8  # Clamped ceiling to prevent memorizing noise

  stage1_model.params.learning_rate:
    type: float
    low: 0.01
    high: 0.15

  stage1_model.params.l2_leaf_reg:
    type: float
    low: 3.0   # Raised floor
    high: 15.0 # Raised ceiling for much stronger regularization

  stage1_model.params.random_strength:
    type: float
    low: 0.0
    high: 3.0  # Slightly expanded ceiling

  stage1_model.params.colsample_bylevel:
    type: float
    low: 0.5
    high: 1.0

  stage1_model.params.one_hot_max_size:
    type: int
    low: 2
    high: 20

  # --- NEW ADDITIONS FOR IMBALANCED/NOISY DATA ---
  stage1_model.params.min_data_in_leaf:
    type: int
    low: 20
    high: 150

  stage1_model.params.bagging_temperature:
    type: float
    low: 0.0
    high: 5.0
  # -----------------------------------------------

  exclude_features:
    type: categorical
    choices:
      - ["Interviewed"]                                # Use all features
      - ["Position", "Scout_*", "Delta_*", "Interviewed"]                        # Remove position (leaving position group)
      - ["*_Z", "Scout_*", "Delta_*", "Interviewed"]                             # Remove z-scores
      - ["Dash", "Strength", "Agility", "Jump", "Position_Specific", "Height", "Weight", "Scout_*", "Delta_*", "Interviewed"]  # Remove combine physical and athletic features

defaults:
  - data: fof8_base
  - target: economic
  - split: chronological
  - cv: kfold_5
  - model@stage1_model: s1_catboost
  - model@stage2_model: reg_tweedie
  - hparams_search: s1_catboost_survival
  - override hydra/sweeper: optuna
  - _self_

experiment_name: "Economic_Talent_Engine_v3"
train_stage2: true
use_gpu: false
seed: 42

mask_positional_features: true
include_features: null
exclude_features: null

optimization:
  metric: "s1_oof_pr_auc"
  direction: "maximize"

diagnostics:
  log_importance: true
  log_shap: true

tags:
  version: "3.0"
  type: "economic_talent"

hydra:
  job:
    chdir: True
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  sweeper:
    direction: ${optimization.direction}
    study_name: economic_optimization_v1
    n_trials: 20
    sampler:
      _target_: optuna.samplers.TPESampler
      seed: 42
      multivariate: true
